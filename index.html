<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Juego</title>

<style>

body{
  background:black;
  color:#00ff99;
  font-family:monospace;

  /* 🔥 MÁS GRANDE EN CELULAR */
  font-size:22px;

  text-align:center;
  margin:0;
  padding:40px 20px;
}

h1{
  font-size:1.6em;
}

p{
  font-size:1.1em;
}

input, button{
  font-family:monospace;
  font-size:18px;
  padding:12px;
  margin-top:12px;
}

input{
  background:black;
  border:1px solid #00ff99;
  color:#00ff99;
  outline:none;
  width:80%;
  max-width:300px;
}

button{
  background:#00ff99;
  border:none;
  cursor:pointer;
  width:60%;
  max-width:200px;
}

button:hover{
  opacity:0.85;
}

</style>
</head>

<body>

<h1>Hola Elizabeth</h1>

<p>
Este es un juego para ver tus capacidades,<br>
a ver si lo descifras jeje 😼.
</p>

<p>Escribe el nombre del creador (osea mi nombre):</p>

<input id="name" autocomplete="off">
<br>

<button onclick="check()">Entrar</button>

<script>

function check(){

  const input = document.getElementById("name").value;

  const v = input
    .toLowerCase()
    .trim()
    .replace(/\s+/g,"");

  if(v === "evan"){
    window.location.href = "nivel1.html";
  } else {
    alert("❌ Incorrecto");
  }
}

</script>

</body>
</html>
