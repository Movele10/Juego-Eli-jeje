<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego</title>

<style>
body{
  background:black;
  color:#00ff99;
  font-family:monospace;
  text-align:center;
  padding-top:60px;
}

input, button{
  padding:10px;
  margin-top:10px;
  font-family:monospace;
}

input{
  background:black;
  border:1px solid #00ff99;
  color:#00ff99;
  outline:none;
}

button{
  background:#00ff99;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>👋 Hola Elizabeth</h1>

<p>
Este es un juego para ver tus capacidades,<br>
a ver si lo descifras.
</p>

<p>🔐 Escribe el nombre del creador (solo minúscula):</p>

<input id="name" autocomplete="off">
<br>

<button onclick="check()">Entrar</button>

<script>
function check(){

  const input = document.getElementById("name").value;

  const v = input
    .toLowerCase()
    .trim()
    .replace(/\s+/g, "");

  if(v === "evan"){
    window.location.href = "nivel1.html";
  } else {
    alert("❌ Incorrecto");
  }
}
</script>

</body>
</html>
