<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nivel 6 - Chef Hacker</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#050505;

color:#00ff99;

font-family:monospace;

overflow:hidden;

user-select:none;

}

h1{

margin-top:20px;

text-align:center;

font-size:35px;

}

#mensaje{

text-align:center;

margin-top:15px;

font-size:18px;

color:#8affc1;

}

#mesa{

width:95%;

height:82vh;

margin:auto;

margin-top:20px;

background:#111;

border:2px solid #00ff99;

border-radius:20px;

position:relative;

overflow:hidden;

}

/* INGREDIENTES */

.item{

position:absolute;

width:90px;

height:90px;

background:#1d1d1d;

border:2px solid #00ff99;

border-radius:15px;

display:flex;

justify-content:center;

align-items:center;

font-size:45px;

cursor:pointer;

transition:.15s;

}

.item:active{

transform:scale(.95);

}

#cebolla{

left:40px;

top:60px;

}

#cuchillo{

left:170px;

top:60px;

}

#limon{

left:300px;

top:60px;

}

#camaron{

left:430px;

top:60px;

}

#salsa{

left:560px;

top:60px;

}

#cuchara{

left:690px;

top:60px;

}

/* VASO */

#vaso{

position:absolute;

left:50%;

bottom:35px;

transform:translateX(-50%);

width:170px;

height:220px;

border:4px solid #00ff99;

border-top:none;

border-radius:0 0 30px 30px;

background:rgba(255,255,255,.04);

display:flex;

justify-content:flex-end;

align-items:center;

flex-direction:column;

overflow:hidden;

}

#contenido{

font-size:32px;

padding-bottom:15px;

}

/* BOTONES */

#panel{

position:absolute;

right:25px;

bottom:25px;

display:flex;

flex-direction:column;

gap:12px;

}

button{

padding:12px;

font-size:18px;

font-family:monospace;

font-weight:bold;

background:#00ff99;

color:black;

border:none;

border-radius:10px;

cursor:pointer;

}

button:hover{

opacity:.85;

}

/* ESTADO */

#estado{

position:absolute;

left:20px;

bottom:20px;

font-size:18px;

color:#9cffcb;

}

/* TOAST */

#toast{

position:fixed;

top:20px;

left:50%;

transform:translateX(-50%);

background:#151515;

border:2px solid #00ff99;

padding:12px 18px;

border-radius:12px;

display:none;

z-index:999;

}

</style>

</head>

<body>

<h1>🍤 Nivel 6 - Chef Hacker</h1>

<div id="mensaje">

ERROR...

El hacker encargado salió a almorzar.

<br><br>

Mientras vuelve...

<b>Prepara un cóctel de camarón.</b>

</div>

<div id="toast"></div>

<div id="mesa">

<div class="item" id="cebolla">🧅</div>

<div class="item" id="cuchillo">🔪</div>

<div class="item" id="limon">🍋</div>

<div class="item" id="camaron">🍤</div>

<div class="item" id="salsa">🍅</div>

<div class="item" id="cuchara">🥄</div>

<div id="vaso">

<div id="contenido">

🥤

</div>

</div>

<div id="panel">

<button id="reiniciar">🔄 Reiniciar</button>

<button id="reversar">↩ Reversar</button>

</div>

<div id="estado">

Esperando la primera acción...

</div>

</div>

<script>

const estado=document.getElementById("estado");

const toast=document.getElementById("toast");

const contenido=document.getElementById("contenido");

const vaso=document.getElementById("vaso");

const historial=[];

let receta=[];

let cebollaCortada=false;

let limonExprimido=false;

let mezclado=false;

let seleccionado=null;

function mensaje(txt){

toast.innerText=txt;

toast.style.display="block";

clearTimeout(window.toastTimer);

window.toastTimer=setTimeout(()=>{

toast.style.display="none";

},1800);

}

function actualizarEstado(txt){

estado.innerText=txt;

}// ===============================
// 🍤 NIVEL 6 - PARTE 2
// LÓGICA DE INTERACCIÓN
// ===============================

// registrar elementos
const items = document.querySelectorAll(".item");

// estado de ingredientes en vaso
let pasos = [];

// ===============================
// 👆 SELECCIÓN / TOUCH / CLICK
// ===============================

items.forEach(item => {

  item.addEventListener("click", () => {
    seleccionar(item.id);
  });

  // soporte móvil (drag simple)
  item.addEventListener("touchstart", (e) => {
    e.preventDefault();
    seleccionar(item.id);
  });

});

// ===============================
// 🎯 SELECCIONAR ITEM
// ===============================

function seleccionar(id){

  seleccionado = id;

  mensaje("Seleccionaste: " + id + " → toca el vaso");

}

// ===============================
// 🥤 VASO CLICK
// ===============================

vaso.addEventListener("click", () => {

  if(!seleccionado){
    mensaje("Selecciona un ingrediente primero");
    return;
  }

  agregarAlVaso(seleccionado);

  seleccionado = null;

});

// ===============================
// ➕ AGREGAR AL VASO
// ===============================

function agregarAlVaso(id){

  historial.push([...pasos]); // guardar estado previo

  pasos.push(id);

  actualizarVaso();

  mensaje("Agregado: " + id);

  actualizarEstado("Ingredientes: " + pasos.length);

}

// ===============================
// 🥤 ACTUALIZAR VASO
// ===============================

function actualizarVaso(){

  let display = "";

  if(pasos.includes("camaron")) display += "🍤";
  if(pasos.includes("cebolla")) display += "🧅";
  if(pasos.includes("limon")) display += "🍋";
  if(pasos.includes("salsa")) display += "🍅";
  if(pasos.includes("cuchara")) display += "🥄";

  contenido.innerText = "🥤\n" + display;

}

// ===============================
// 🔄 REINICIAR
// ===============================

document.getElementById("reiniciar").onclick = () => {

  pasos = [];
  historial.length = 0;
  seleccionado = null;

  actualizarVaso();

  mensaje("🔄 Reiniciado");

  actualizarEstado("Esperando la primera acción...");

};

// ===============================
// ↩ REVERSAR
// ===============================

document.getElementById("reversar").onclick = () => {

  if(historial.length === 0){
    mensaje("No hay acciones para revertir");
    return;
  }

  pasos = historial.pop();

  actualizarVaso();

  mensaje("↩ Acción revertida");

  actualizarEstado("Ingredientes: " + pasos.length);

};
// ===============================
// 🍤 PARTE 3 - REGLAS DEL JUEGO
// ===============================

// orden esperado de receta (simplificado)
const recetaCorrecta = [
  "cebolla",
  "limon",
  "camaron",
  "salsa",
  "cuchara"
];

let pasoActual = 0;

// ===============================
// 🔪 ACCIONES ESPECIALES
// ===============================

// interceptar clicks de ingredientes otra vez (lógica extra)
items.forEach(item => {

  item.addEventListener("dblclick", () => {
    usarHerramienta(item.id);
  });

});

// ===============================
// ⚙️ USAR HERRAMIENTA
// ===============================

function usarHerramienta(id){

  if(id === "cuchillo"){

    cebollaCortada = true;
    mensaje("Cebolla lista para usar");

  }

  if(id === "limon"){

    if(!limonExprimido){
      limonExprimido = true;
      mensaje("Limón exprimido");
    }

  }

}

// ===============================
// 🥤 VALIDAR ORDEN
// ===============================

function validarPaso(id){

  if(id !== recetaCorrecta[pasoActual]){

    mensaje("❌ Orden incorrecto");

    actualizarEstado("Error en la receta...");

    return false;

  }

  pasoActual++;

  return true;

}

// ===============================
// ➕ MODIFICAR AGREGAR AL VASO
// (sobrescribimos lógica Parte 2)
// ===============================

const oldAgregar = agregarAlVaso;

agregarAlVaso = function(id){

  // reglas especiales
  if(id === "cebolla" && !cebollaCortada){
    mensaje(" Necesitas cortar la cebolla primero");
    return;
  }

  if(!validarPaso(id)){
    return;
  }

  historial.push([...pasos]);

  pasos.push(id);

  actualizarVaso();

  mensaje("✔ " + id + " agregado");

  actualizarEstado("Paso " + pasoActual + "/5");

  // victoria
  if(pasoActual >= recetaCorrecta.length){
    setTimeout(victoria, 800);
  }

};

// ===============================
// 🎉 VICTORIA
// ===============================

function victoria(){

  document.body.innerHTML = `
    <div style="color:#00ff99;text-align:center;margin-top:100px;font-family:monospace;">
      🍤 CÓCTEL COMPLETADO<br><br>
      ✔ Receta correcta<br>
      ✔ Sistema hackeado culinario<br><br>
      <b>Acceso al Nivel 7 desbloqueado</b>
    </div>
  `;

  setTimeout(() => {
    window.location.href = "nivel7.html";
  }, 2500);

  }
