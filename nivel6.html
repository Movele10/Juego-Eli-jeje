<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plane Survival PRO</title>

<style>

body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:monospace;
  color:#00ff99;
}

/* GAME */
#game{
  position:relative;
  width:100vw;
  height:100vh;
  background:linear-gradient(#000,#050515);
  display:none;
}

/* AVIÓN */
#plane{
  position:absolute;
  font-size:40px;
  left:50%;
  top:65%;
  transform:translateX(-50%);
}

/* BALAS */
.bullet{
  position:absolute;
  width:10px;
  height:10px;
  background:red;
  border-radius:50%;
}

/* UI */
#info{
  position:absolute;
  top:10px;
  left:10px;
}

#timer{
  position:absolute;
  top:40px;
  left:10px;
}

/* ZONAS TOUCH */
.zone{
  position:absolute;
  top:0;
  width:50%;
  height:100%;
}

#leftZone{ left:0; }
#rightZone{ right:0; }

/* TUTORIAL */
#tutorial{
  position:absolute;
  width:100vw;
  height:100vh;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

button{
  margin-top:20px;
  padding:10px 20px;
  background:#00ff99;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- TUTORIAL -->
<div id="tutorial">

<h1>✈️ Cómo jugar</h1>

<p>
Mantén el avión lo más cerca del CENTRO posible.<br>
Si se inclina demasiado o te golpean → pierdes estabilidad.
</p>

<p>
⏱ Sobrevive 20 segundos para pasar el nivel.
</p>

<button onclick="startGame()">JUGAR</button>

</div>

<!-- JUEGO -->
<div id="game">

<div id="info">Estabilidad: 100%</div>
<div id="timer">⏱ 0 / 20s</div>

<div id="plane">✈️</div>

<div id="leftZone" class="zone"></div>
<div id="rightZone" class="zone"></div>

</div>

<script>

let plane = document.getElementById("plane");

let x = window.innerWidth/2;
let center = window.innerWidth/2;
let tilt = 0;
let stability = 100;
let time = 0;

/* START */
function startGame(){
  document.getElementById("tutorial").style.display="none";
  document.getElementById("game").style.display="block";
}

/* TIMER */
setInterval(()=>{

  if(stability <= 0) return;

  time += 0.1;

  document.getElementById("timer").innerText =
  "⏱ " + time.toFixed(1) + " / 20s";

  if(time >= 20){
    win();
  }

},100);

/* MOVIMIENTO */
function update(){

  tilt += (Math.random()-0.5)*1.5;

  x += tilt;

  tilt *= 0.96;

  // 🎯 objetivo: mantenerse cerca del centro
  let distCenter = Math.abs(x - center);

  if(distCenter > 120){
    stability -= 0.4;
  }

  plane.style.left = x + "px";
  plane.style.transform = `translateX(-50%) rotate(${tilt*3}deg)`;

  document.getElementById("info").innerText =
  "Estabilidad: " + Math.floor(stability) + "%";

  if(stability <= 0){
    lose();
  }

}

setInterval(update, 20);

/* CONTROLES */
document.getElementById("leftZone").addEventListener("touchstart",()=>{
  tilt -= 3;
});

document.getElementById("rightZone").addEventListener("touchstart",()=>{
  tilt += 3;
});

/* TECLADO */
document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowLeft") tilt -= 3;
  if(e.key==="ArrowRight") tilt += 3;
});

/* HITBOX */
function planeHitbox(){
  const r = plane.getBoundingClientRect();
  return { x:r.left+r.width/2, y:r.top+r.height/2 };
}

function bulletHitbox(b){
  const r = b.getBoundingClientRect();
  return { x:r.left+r.width/2, y:r.top+r.height/2 };
}

function distance(a,b){
  return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
}

/* 💣 MÁS BALAS */
function spawnBullet(){

  for(let i=0;i<2;i++){ // 🔥 MÁS DENSIDAD

    let b = document.createElement("div");
    b.className = "bullet";

    let bx = Math.random()*window.innerWidth;

    b.style.left = bx + "px";
    b.style.top = "0px";

    document.getElementById("game").appendChild(b);

    let y = 0;

    let move = setInterval(()=>{

      y += 7;
      b.style.top = y + "px";

      const p = planeHitbox();
      const bu = bulletHitbox(b);

      if(distance(p,bu) < 35){
        lose();
      }

      if(y > window.innerHeight){
        b.remove();
        clearInterval(move);
      }

    },20);

  }
}

setInterval(spawnBullet, 500); // 🔥 MÁS FRECUENTE

/* WIN */
function win(){

  document.body.innerHTML = `
    <h1>sacate la lincencia de piloto enseguida carajooo</h1>
    <p>20 segundos sobrevividos</p>
  `;

  setTimeout(()=>{
    window.location.href = "nivel7.html";
  },2000);

}

/* LOSE */
function lose(){

  document.body.innerHTML = `
    <h1>hiciste el 9/11!!! ✈️🏢🏢</h1>
  `;

  setTimeout(()=>{
    location.reload();
  },1500);

}

</script>

</body>
</html>
