<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plane Survival RANDOM</title>

<style>

body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:monospace;
  color:#00ff99;
}

#game{
  position:relative;
  width:100vw;
  height:100vh;
  background:linear-gradient(#000,#050515);
  display:none;
}

/* AVIÓN */
#plane{
  position:absolute;
  font-size:40px;
  left:50%;
  top:65%;
  transform:translateX(-50%);
}

/* BALAS */
.bullet{
  position:absolute;
  width:10px;
  height:10px;
  background:red;
  border-radius:50%;
}

/* UI */
#info{
  position:absolute;
  top:10px;
  left:10px;
}

#timer{
  position:absolute;
  top:40px;
  left:10px;
}

#winmsg{
  position:absolute;
  top:80px;
  left:10px;
  color:yellow;
}

/* ZONAS */
.zone{
  position:absolute;
  top:0;
  width:50%;
  height:100%;
}

#leftZone{ left:0; }
#rightZone{ right:0; }

/* TUTORIAL */
#tutorial{
  position:absolute;
  width:100vw;
  height:100vh;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

button{
  margin-top:20px;
  padding:10px 20px;
  background:#00ff99;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- TUTORIAL -->
<div id="tutorial">

<h1>✈️ Cómo jugar</h1>

<p>Mantén el avión estable y esquiva balas</p>
<p>⏱ Sobrevive 20 segundos</p>

<button onclick="startGame()">JUGAR</button>

</div>

<!-- GAME -->
<div id="game">

<div id="info">Estabilidad: 100%</div>
<div id="timer">⏱ 0 / 20s</div>
<div id="winmsg"></div>

<div id="plane">✈️</div>

<div id="leftZone" class="zone"></div>
<div id="rightZone" class="zone"></div>

</div>

<script>

let plane = document.getElementById("plane");

let x = window.innerWidth/2;
let center = window.innerWidth/2;
let tilt = 0;
let stability = 100;

let time = 0;
let won = false;

let started = false;
let bulletsEnabled = false;

/* START */
function startGame(){
  document.getElementById("tutorial").style.display="none";
  document.getElementById("game").style.display="block";

  setTimeout(()=>started=true,3000);
  setTimeout(()=>bulletsEnabled=true,2000);
}

/* TIMER */
setInterval(()=>{

  if(!started || stability <= 0) return;

  time += 0.1;

  document.getElementById("timer").innerText =
  "⏱ " + time.toFixed(1) + " / 20s";

  if(time >= 20 && !won){
    win();
  }

},100);

/* MOVIMIENTO */
function update(){

  if(!started) return;

  center = window.innerWidth/2;

  tilt += (Math.random()-0.5)*1.2;
  x += tilt;
  tilt *= 0.96;

  let distCenter = Math.abs(x - center);

  if(distCenter > 180) stability -= 0.2;
  if(x < 10 || x > window.innerWidth-10) stability -= 0.5;

  plane.style.left = x + "px";
  plane.style.transform = `translateX(-50%) rotate(${tilt*3}deg)`;

  document.getElementById("info").innerText =
  "Estabilidad: " + Math.floor(stability) + "%";

  if(stability <= 0){
    lose();
  }

}

setInterval(update,20);

/* CONTROLES */
document.getElementById("leftZone").addEventListener("touchstart",()=>{
  tilt -= 3;
});

document.getElementById("rightZone").addEventListener("touchstart",()=>{
  tilt += 3;
});

document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowLeft") tilt -= 3;
  if(e.key==="ArrowRight") tilt += 3;
});

/* HITBOX */
function planeHitbox(){
  const r = plane.getBoundingClientRect();
  return { x:r.left+r.width/2, y:r.top+r.height/2 };
}

function bulletHitbox(b){
  const r = b.getBoundingClientRect();
  return { x:r.left+r.width/2, y:r.top+r.height/2 };
}

function distance(a,b){
  return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
}

/* 💣 BALAS RANDOM */
function spawnBullet(){

  if(!bulletsEnabled) return;

  let b = document.createElement("div");
  b.className = "bullet";

  let w = window.innerWidth;

  let zone = Math.floor(Math.random()*3);
  let bx;

  if(zone === 0){
    bx = w * 0.25;
  } 
  else if(zone === 1){
    bx = w * 0.5;
  } 
  else{
    bx = w * 0.75;
  }

  bx += (Math.random()-0.5)*40;

  b.style.left = bx + "px";
  b.style.top = "0px";

  document.getElementById("game").appendChild(b);

  let y = 0;

  let move = setInterval(()=>{

    y += 6;
    b.style.top = y + "px";

    const p = planeHitbox();
    const bu = bulletHitbox(b);

    if(distance(p,bu) < 35){
      lose();
    }

    if(y > window.innerHeight){
      b.remove();
      clearInterval(move);
    }

  },20);

}

/* SPAWN CADA 400ms */
setInterval(spawnBullet,400);

/* WIN */
function win(){

  won = true;

  document.getElementById("winmsg").innerText =
  "Escapaste de Abelardo de la espriella!";

  setTimeout(()=>{
    window.location.href = "nivel7.html";
  },2000);

}

/* LOSE */
function lose(){

  document.body.innerHTML = `
    <h1>Hiciste el 9/11!!! ✈️🏢🏢</h1>
    <p>Reintentando...</p>
  `;

  setTimeout(()=>location.reload(),1500);

}

</script>

</body>
</html>
