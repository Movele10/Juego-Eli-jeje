<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nivel 4</title>

<style>

body{
    background:black;
    color:#00ff99;
    font-family:monospace;

    font-size:20px;

    margin:0;
    padding:25px;
    text-align:center;
}

h2{
    margin-bottom:20px;
    font-size:1.4em;
}

#terminal{
    max-width:850px;
    margin:auto;
    text-align:left;
    background:#111;
    border:1px solid #00ff99;
    padding:18px;
    border-radius:8px;

    min-height:220px;

    white-space:pre-wrap;
    word-wrap:break-word;

    font-size:16px;
    line-height:1.6;
}

button{
    margin-top:20px;
    padding:12px 18px;
    background:#00ff99;
    color:black;
    border:none;
    cursor:pointer;
    font-family:monospace;
    font-size:18px;
    font-weight:bold;
    transition:.2s;
}

button:hover{
    opacity:.85;
}

</style>

</head>

<body>

<h2>Ultimo nivel, la verdad está a punto de ser revelada. </h2>

<div id="terminal"></div>

<button id="btn" onclick="start()">▶ Ver mensaje final</button>

<script>

const text = `
... ACCEDIENDO SISTEMA FINAL ...

Hola, Elizabeth.

Supongo que ya entendiste el juego.

Si llegaste hasta aquí, significa que seguiste cada pista,
cada código y cada nivel sin rendirte.

Y ahora sí...

preparate Eli, este "juego" es porque no encontraba forma de hacerlo.

No era solo un juego.

Era una forma de decirlo.

🤭

que penaaa  😭😭😭

Abriendo mensaje final...
`;

let i = 0;
let started = false;
let finished = false;

const terminal = document.getElementById("terminal");
const btn = document.getElementById("btn");

function type(){

    if(i < text.length){
        terminal.innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 28);
    } else {
        finished = true;

        // 💌 cambia el botón cuando termina
        btn.innerText = "💌";
    }
}

function start(){

    // 🔥 PRIMER CLICK: escribe el mensaje
    if(!started){
        started = true;
        terminal.innerHTML = "";
        i = 0;
        type();
        return;
    }

    // 💌 SEGUNDO CLICK: redirige
    if(finished){
        window.location.href = "https://movele10.github.io/Mensaje-lol/";
    }
}

</script>

</body>
</html>
