<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nivel 3</title>

<style>

body{
    background:black;
    color:#00ff99;
    font-family:monospace;

    font-size:20px;

    margin:0;
    padding:25px;
    text-align:center;
}

h2{
    margin-bottom:20px;
    font-size:1.4em;
}

#box{
    max-width:900px;
    margin:auto;
    background:#111;
    border:1px solid #00ff99;
    border-radius:8px;
    padding:15px;
    word-break:break-word;
}

#texto{
    font-size:16px;
}

input{
    margin-top:20px;
    padding:12px;
    width:85%;
    max-width:320px;
    background:black;
    color:#00ff99;
    border:1px solid #00ff99;
    font-family:monospace;
    font-size:18px;
    outline:none;
}

button{
    margin-top:15px;
    padding:12px 18px;
    background:#00ff99;
    color:black;
    border:none;
    cursor:pointer;
    font-family:monospace;
    font-size:18px;
    font-weight:bold;
    transition:.2s;
}

button:hover{
    opacity:.85;
}

.pista{
    margin-top:25px;
    color:gray;
    font-size:14px;
}

</style>

</head>

<body>

<h2>El Nivel 3 es: Atbash</h2>

<div id="box">
<p id="texto">
kivkzizgv vor, oz kilcrnz ez z xzvi xlnl fmz ylnyz
</p>
</div>

<input id="ans" placeholder="Escribe la traducción">

<br>

<button onclick="check()">Verificar</button>

<p class="pista">
🗣️‼️🔥 Vamos... usa el traductor, esto no es tan difícil (atbash ingles).
</p>

<script>

/* NORMALIZACIÓN FUERTE */
function normalize(str){
    return str
        .toLowerCase()
        .trim()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g,"")
        .replace(/[.,;:¡!¿?]/g,"")
        .replace(/\s+/g," ");
}

/* CHECK */
function check(){

    let respuesta = normalize(document.getElementById("ans").value);

    let correcta = normalize("preparate eli, la proxima va a caer como una bomba");

    if(respuesta === correcta){

        document.body.innerHTML = `
        <h1 style="color:#00ff99;font-family:monospace;margin-top:100px;">
        ✅ Nivel completado...<br><br>
        Cargando Nivel 4...
        </h1>
        `;

        setTimeout(()=>{
            window.location.href = "nivel4.html";
        },2000);

    } else {
        alert("❌ Incorrecto. Intenta de nuevo.");
    }
}

/* ENTER */
document.getElementById("ans").addEventListener("keydown",function(e){
    if(e.key==="Enter"){
        check();
    }
});

</script>

</body>
</html>
